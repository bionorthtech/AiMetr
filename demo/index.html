<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clawdmeter — Device Sandbox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #000000;
  --panel:   #1f1f1e;
  --text:    #faf9f5;
  --dim:     #b0aea5;
  --accent:  #d97757;
  --green:   #788c5d;
  --amber:   #d97757;
  --red:     #c0392b;
  --bar-bg:  #2a2a28;
}
body {
  background: #0a0a0c;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: 'Inter', -apple-system, system-ui, sans-serif;
  padding: 24px; gap: 20px;
  color: var(--text);
}
.page-title {
  color: var(--dim); font-size: 12px;
  letter-spacing: 0.18em; text-transform: uppercase;
  font-weight: 500;
}
.device-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; }
.device {
  background: linear-gradient(160deg, #f4f1ec 0%, #d8d2c5 60%, #b8b2a5 100%);
  border-radius: 32px;
  padding: 16px;
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.1),
    0 30px 60px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.5);
  position: relative;
}
.device::after {
  content: ''; position: absolute; top: 50%; right: -4px;
  transform: translateY(-50%); width: 3px; height: 60px;
  background: #b8b2a5; border-radius: 2px 4px 4px 2px;
}
.device.dark {
  background: linear-gradient(160deg, #2a2a2a 0%, #181818 60%, #0a0a0a 100%);
}
.device.dark::after { background: #1a1a1a; }
.screen-frame {
  background: #000; border-radius: 18px; overflow: hidden;
  cursor: pointer; user-select: none; position: relative;
}
.screen-frame canvas { display: block; }
.device-brand {
  text-align: center; color: rgba(0,0,0,0.4); font-size: 9px;
  letter-spacing: 0.3em; text-transform: uppercase;
  margin-top: 8px; font-weight: 600;
}
.controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.btn {
  background: #1a1a1a; border: 1px solid #2a2a2a; color: #b0aea5;
  padding: 8px 16px; border-radius: 6px; cursor: pointer;
  font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
  font-family: 'Inter', sans-serif; transition: all 0.15s;
}
.btn:hover { background: #2a2a2a; color: #faf9f5; border-color: #d97757; }
.btn.on { background: #d97757; border-color: #d97757; color: #faf9f5; }
.screen-tabs { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; max-width: 560px; }
.tab {
  background: #141414; border: 1px solid #2a2a2a; color: #b0aea5;
  padding: 5px 11px; border-radius: 5px; cursor: pointer; font-size: 10.5px;
  font-family: 'Inter', sans-serif; font-weight: 500; letter-spacing: 0.03em;
}
.tab:hover, .tab.on { background: #2a2a2a; color: #faf9f5; }
.tab.on { border-color: #d97757; }
.credit { color: #444; font-size: 10px; text-align: center; }
.credit a { color: #d97757; text-decoration: none; }
</style>
</head>
<body>

<div class="page-title">Clawdmeter v2 · Multi-Provider Device Sandbox</div>

<div class="device-wrap">
  <div class="device dark">
    <div class="screen-frame" id="screen-frame">
      <canvas id="screen" width="480" height="480"></canvas>
    </div>
    <div class="device-brand">CLAWDMETER</div>
  </div>

  <div class="screen-tabs" id="screen-tabs">
    <button class="tab on"  data-s="0" onclick="goScreen(0)">Splash</button>
    <button class="tab" data-s="1" onclick="goScreen(1)">Claude</button>
    <button class="tab" data-s="2" onclick="goScreen(2)">OpenAI</button>
    <button class="tab" data-s="3" onclick="goScreen(3)">DeepSeek</button>
    <button class="tab" data-s="4" onclick="goScreen(4)">Ollama</button>
    <button class="tab" data-s="5" onclick="goScreen(5)">LM Studio</button>
    <button class="tab" data-s="6" onclick="goScreen(6)">Tasks</button>
    <button class="tab" data-s="7" onclick="goScreen(7)">Bluetooth</button>
  </div>

  <div class="controls">
    <button class="btn" onclick="cycleNext()">Next ›</button>
    <button class="btn" id="auto-btn" onclick="toggleAuto()">⏸ Pause</button>
    <button class="btn on" id="follow-btn" onclick="toggleFollow()">⤳ Follow active</button>
    <button class="btn" id="ble-btn" onclick="toggleBLE()">BLE: On</button>
  </div>
</div>

<div class="credit">Built on the original by <a href="https://github.com/HermannBjorgvin/Clawdmeter">@hermannbjorgvin</a> · Clawd animations by <a href="https://x.com/amaanbuilds">@amaanbuilds</a></div>

const off1 = document.createElement('canvas'); off1.width=W; off1.height=H;
const off2 = document.createElement('canvas'); off2.width=W; off2.height=H;

// ── Mascot animation tracking ────────────────────────────────────────────
const MANIM = {};
PROVIDERS.forEach(p => { MANIM[p.mascot] = { frame: 0, elapsed: 0 }; });
const SPLASH_ANIM = { frame: 0, elapsed: 0 };

function getMascotState(provId) {
  const s = STATE[provId];
  if (!s || !s.connected) return 'offline';
  if (s.pct >= 75) return 'excited';
  if (s.pct >= 10) return 'thinking';
  return 'idle';
}

function getFrameData(mascotId, stateKey, frame) {
  const st = (stateKey === 'offline') ? 'idle' : stateKey;
  if (mascotId === 'clawd' && typeof CLAWD_SPRITES !== 'undefined') {
    const a = CLAWD_SPRITES[st] || CLAWD_SPRITES.idle;
    return { frames: a.frames, palette: a.palette, holds: a.holds };
  }
  if (mascotId === 'seeker' && typeof SEEKER_SPRITE !== 'undefined') {
    const f = SEEKER_SPRITE.frames[st] || SEEKER_SPRITE.frames.idle;
    return { frames: f, palette: SEEKER_SPRITE.palette, holds: null };
  }
  if (mascotId === 'codex' && typeof CODEX_SPRITE !== 'undefined') {
    const f = CODEX_SPRITE.frames[st] || CODEX_SPRITE.frames.idle;
    return { frames: f, palette: CODEX_SPRITE.palette, holds: null };
  }
  return null;
}

function getHold(mascotId, stateKey, frame) {
  const d = getFrameData(mascotId, stateKey, frame);
  if (d && d.holds) return d.holds[frame % d.holds.length] || 400;
  if (stateKey === 'excited') return 150;
  if (stateKey === 'thinking') return 250;
  if (stateKey === 'sleeping') return 900;
  return 500;
}

// ── Sprite renderer ──────────────────────────────────────────────────────
function drawSpriteGrid(ctx, x, y, flatGrid, palette, scale, alpha) {
  ctx.save();
  if (alpha !== undefined) ctx.globalAlpha = alpha;
  for (let i = 0; i < flatGrid.length; i++) {
    const v = flatGrid[i];
    const col = palette[v];
    if (!col || col === 'transparent') continue;
    const px = i % 20, py = Math.floor(i / 20);
    ctx.fillStyle = col;
    ctx.fillRect(x + px*scale, y + py*scale, scale, scale);
  }
  ctx.restore();
}

function drawMascot(ctx, mascotId, provId, cx, cy, size, animOverride) {
  const scale = Math.round(size / 20);
  const ox = cx - size/2, oy = cy - size/2;
  const mSt = getMascotState(provId);
  const st = (mSt === 'offline') ? 'idle' : mSt;
  const alpha = (mSt === 'offline') ? 0.3 : 1.0;
  const anim = animOverride || MANIM[mascotId];

  const data = getFrameData(mascotId, st, anim.frame);
  if (data) {
    const frame = data.frames[anim.frame % data.frames.length];
    drawSpriteGrid(ctx, ox, oy, frame, data.palette, scale, alpha);
    return;
  }
  if (mascotId === 'llami') drawLlamaProc(ctx, cx, cy, size, mSt, anim.frame, alpha);
  else if (mascotId === 'studio') drawRobotProc(ctx, cx, cy, size, mSt, anim.frame, alpha);
}

// ── Procedural llama (Ollama) ──────────────────────────────────────────
function drawLlamaProc(ctx, cx, cy, size, state, frame, alpha) {
  const s = size / 20;
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.translate(cx, cy);
  const bob = (state==='excited')?(frame%2?-1:1)*s:(state==='idle')?(frame%2?0:0.5)*s:0;
  ctx.translate(0, bob);
  // Body (using 20x20 grid)
  const gold='#F9A825', cream='#FFE6B4', brn='#784A14';
  const drawCell = (c, r, col) => {
    ctx.fillStyle = col;
    ctx.fillRect((c-10)*s, (r-10)*s, s, s);
  };
  // Head body
  for(let r=5;r<15;r++) for(let c=5;c<15;c++) drawCell(c,r,gold);
  // Ears
  for(let r=2;r<6;r++) { drawCell(5,r,gold); drawCell(6,r,gold); drawCell(13,r,gold); drawCell(14,r,gold); }
  // Tuft
  for(let r=1;r<5;r++) for(let c=7;c<13;c++) drawCell(c,r,cream);
  // Snout
  for(let r=11;r<14;r++) for(let c=7;c<13;c++) drawCell(c,r,cream);
  // Eyes
  if(state==='sleeping') {
    drawCell(7,9,brn); drawCell(8,9,brn);
    drawCell(11,9,brn); drawCell(12,9,brn);
  } else {
    drawCell(7,9,brn); drawCell(12,9,brn);
  }
  // Nostrils
  drawCell(8,13,brn); drawCell(11,13,brn);
  // Neck
  for(let r=15;r<19;r++) for(let c=8;c<12;c++) drawCell(c,r,gold);
  ctx.restore();
}

// ── Procedural robot (LM Studio) ───────────────────────────────────────
function drawRobotProc(ctx, cx, cy, size, state, frame, alpha) {
  const s = size / 20;
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.translate(cx, cy);
  const bob = (state==='excited')?(frame%2?-1:1)*s:(state==='idle')?(frame%2?0:0.5)*s:0;
  ctx.translate(0, bob);
  const pur='#9C27B0', lav='#C88ADC', led=(state==='excited'?'#FF50FF':'#C864FF'), drk='#3C0A50';
  const drawCell = (c, r, col) => {
    ctx.fillStyle = col;
    ctx.fillRect((c-10)*s, (r-10)*s, s, s);
  };
  // Antenna
  for(let r=1;r<4;r++) drawCell(10,r,lav);
  drawCell(10,0,frame%2===0?led:pur);
  // Head box
  for(let r=4;r<14;r++) for(let c=4;c<16;c++) drawCell(c,r,pur);
  // Visor
  for(let r=6;r<11;r++) for(let c=5;c<15;c++) drawCell(c,r,drk);
  // LED eyes
  for(let r=7;r<10;r++) {
    for(let c=6;c<9;c++) drawCell(c,r,led);
    for(let c=11;c<14;c++) drawCell(c,r,led);
  }
  // Mouth
  [6,8,10,12].forEach((c,i) => drawCell(c,11, i%2===frame%2 ? led : drk));
  // Neck/shoulders
  for(let c=7;c<13;c++) drawCell(c,14,pur);
  for(let c=2;c<18;c++) drawCell(c,15,lav);
  ctx.restore();
}

// ── Helpers ────────────────────────────────────────────────────────────
function bar_color(pct) {
  if (pct >= 80) return T.red;
  if (pct >= 50) return T.amber;
  return T.green;
}

function fmt_pct(p) { return p + '%'; }
function fmt_reset(h, m) {
  if (h === 0 && m === 0) return 'Resets soon';
  if (h === 0) return `Resets in ${m}m`;
  return `Resets in ${h}h ${m}m`;
}
function fmt_week(d, h) {
  if (d === 0 && h === 0) return 'Resets soon';
  return `Resets in ${d}d ${h}h`;
}
function fmt_tok(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'k';
  return String(n);
}

// ── Battery icon (right side of header) ───────────────────────────────
function drawBattery(ctx, x, y, level) {
  // 48×48 visual area, battery body 38×18 + nub
  const bw = 38, bh = 18;
  const bx = x, by = y + 14;
  ctx.strokeStyle = T.text;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 3);
  ctx.stroke();
  // Nub
  ctx.fillStyle = T.text;
  ctx.fillRect(bx + bw, by + 5, 3, 8);
  // Fill
  const innerPad = 3;
  const fillW = (bw - innerPad*2) * level;
  if (fillW > 0) {
    ctx.fillStyle = T.text;
    ctx.beginPath();
    ctx.roundRect(bx + innerPad, by + innerPad, fillW, bh - innerPad*2, 1);
    ctx.fill();
  }
}

// ── Header — small mascot, serif title, battery ──────────────────────
function drawHeader(ctx, title, provIdx) {
  // Small mascot top-left (32×32 sprite at scale 1.6 = ~32px)
  const mascotX = L.margin, mascotY = L.margin + 2;
  if (provIdx >= 0) {
    const p = PROVIDERS[provIdx];
    drawMascot(ctx, p.mascot, p.id, mascotX + 16, mascotY + 16, 32);
  }
  // Title - serif font, centered
  ctx.fillStyle = T.text;
  ctx.font = '700 44px "Playfair Display", "Tiempos", Georgia, serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(title, W/2, 58);
  // Battery
  drawBattery(ctx, W - L.margin - 38, L.margin, 0.85);
}

// ── Panel (rounded card) ────────────────────────────────────────────────
function drawPanel(ctx, x, y, w, h) {
  ctx.fillStyle = T.panel;
  ctx.beginPath(); ctx.roundRect(x, y, w, h, L.panel_r); ctx.fill();
}

// ── Pill badge (e.g. "Current", "Weekly") ─────────────────────────────
function drawPill(ctx, x, y, text, isRight) {
  ctx.font = '500 18px "Inter", -apple-system, sans-serif';
  const tw = ctx.measureText(text).width;
  const pw = tw + L.pill_pad_x*2;
  const ph = 32;
  const px = isRight ? x - pw : x;
  ctx.fillStyle = '#2a2a28';
  ctx.beginPath(); ctx.roundRect(px, y, pw, ph, 16); ctx.fill();
  ctx.fillStyle = T.dim;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, px + L.pill_pad_x, y + ph/2 + 1);
  return pw;
}

// ── Progress bar (24px tall, rounded) ──────────────────────────────────
function drawBar(ctx, x, y, w, pct) {
  ctx.fillStyle = T.bar_bg;
  ctx.beginPath(); ctx.roundRect(x, y, w, L.bar_h, L.bar_r); ctx.fill();
  const fw = Math.max(0, Math.min(w, w * pct / 100));
  if (fw > 0) {
    ctx.fillStyle = bar_color(pct);
    ctx.beginPath(); ctx.roundRect(x, y, fw, L.bar_h, L.bar_r); ctx.fill();
  }
}

// ── Spinner + animated message (bottom of usage screens) ──────────────
function drawSpinnerLine(ctx, y) {
  const spinIdx = Math.floor(Date.now() / 130) % SPINNER_FRAMES.length;
  const msg = ANIM_MESSAGES[messageIdx];
  ctx.fillStyle = T.accent;
  ctx.font = '500 22px "JetBrains Mono", ui-monospace, monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(`${SPINNER_FRAMES[spinIdx]}  ${msg}…`, W/2, y);
}

// ── Pick the most-active provider (or first connected one) ────────────
function getActiveProvider() {
  let best = -1, bestPct = -1;
  PROVIDERS.forEach((p, i) => {
    const s = STATE[p.id];
    if (s && s.connected && (s.pct || 0) > bestPct) {
      best = i; bestPct = s.pct || 0;
    }
  });
  return best < 0 ? 0 : best;   // default to Claude if nothing connected
}

// ── Screen 0: Splash — shows mascot for currently active provider ──────
function renderSplash(ctx) {
  ctx.fillStyle = T.bg;
  ctx.fillRect(0, 0, W, H);
  const activeIdx = getActiveProvider();
  const p = PROVIDERS[activeIdx];
  // Big centred mascot
  drawMascot(ctx, p.mascot, p.id, W/2, H/2 - 20, 360, SPLASH_ANIM);
  // Provider name in serif under mascot
  ctx.fillStyle = T.text;
  ctx.font = '600 28px "Playfair Display", Georgia, serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(p.name, W/2, H - 56);
  // Tap hint
  ctx.fillStyle = T.dim;
  ctx.font = '400 13px "Inter", sans-serif';
  ctx.fillText('Tap to continue', W/2, H - 28);
}

// ── Per-provider Usage screen (matches original exactly) ──────────────
function renderProviderUsage(ctx, provIdx) {
  const p = PROVIDERS[provIdx];
  const s = STATE[p.id];
  ctx.fillStyle = T.bg;
  ctx.fillRect(0, 0, W, H);
  drawHeader(ctx, p.name, provIdx);

  if (!s.connected) {
    drawPanel(ctx, L.margin, L.panel_y + 40, L.content_w, 80);
    ctx.fillStyle = T.dim;
    ctx.font = '500 22px "Inter", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(s.error || 'Not configured', W/2, L.panel_y + 90);
    // Offline spinner
    ctx.fillStyle = T.dim;
    ctx.font = '500 18px "JetBrains Mono", ui-monospace, monospace';
    ctx.fillText('· Sleeping…', W/2, H - 36);
    return;
  }

  // Panel 1: Current
  const p1y = L.panel_y;
  drawPanel(ctx, L.margin, p1y, L.content_w, L.panel_h);
  // Big % label
  ctx.fillStyle = T.text;
  ctx.font = '700 56px "Playfair Display", Georgia, serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(fmt_pct(s.pct), L.margin + L.panel_pad_x, p1y + 56);
  // "Current" pill on right
  drawPill(ctx, W - L.margin - L.panel_pad_x, p1y + 16, 'Current', true);
  // Bar
  drawBar(ctx, L.margin + L.panel_pad_x, p1y + 76,
          L.content_w - L.panel_pad_x*2, s.pct);
  // Reset timer
  ctx.fillStyle = T.dim;
  ctx.font = '500 20px "Inter", sans-serif';
  ctx.fillText(fmt_reset(s.reset_h || 0, s.reset_m || 0),
               L.margin + L.panel_pad_x, p1y + L.panel_h - 18);

  // Panel 2: Weekly
  const p2y = p1y + L.panel_h + L.panel_gap;
  drawPanel(ctx, L.margin, p2y, L.content_w, L.panel_h);
  ctx.fillStyle = T.text;
  ctx.font = '700 56px "Playfair Display", Georgia, serif';
  ctx.fillText(fmt_pct(s.pct2), L.margin + L.panel_pad_x, p2y + 56);
  drawPill(ctx, W - L.margin - L.panel_pad_x, p2y + 16, 'Weekly', true);
  drawBar(ctx, L.margin + L.panel_pad_x, p2y + 76,
          L.content_w - L.panel_pad_x*2, s.pct2);
  ctx.fillStyle = T.dim;
  ctx.font = '500 20px "Inter", sans-serif';
  ctx.fillText(fmt_week(s.week_d || 0, s.week_h || 0),
               L.margin + L.panel_pad_x, p2y + L.panel_h - 18);

  // Bottom spinner + message
  drawSpinnerLine(ctx, H - 30);
}

// ── Tasks screen ──────────────────────────────────────────────────────
function renderTasks(ctx) {
  ctx.fillStyle = T.bg;
  ctx.fillRect(0, 0, W, H);
  drawHeader(ctx, 'Tasks', 0);

  const cardH = 88, gap = 12;
  TASKS.forEach((task, i) => {
    const ty = L.panel_y + i * (cardH + gap);
    const p = PROVIDERS[task.prov];
    const total = task.ti + task.to;
    const pct = Math.min(100, Math.round(total*100 / task.limit));

    drawPanel(ctx, L.margin, ty, L.content_w, cardH);
    // Tiny accent stripe
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.roundRect(L.margin, ty, 4, cardH, 2); ctx.fill();

    // Task label
    ctx.fillStyle = T.text;
    ctx.font = '600 18px "Inter", sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
    const lbl = task.label.length > 32 ? task.label.slice(0,30)+'…' : task.label;
    ctx.fillText(lbl, L.margin + L.panel_pad_x + 4, ty + 26);

    // Model + tokens
    ctx.fillStyle = T.dim;
    ctx.font = '500 14px "Inter", sans-serif';
    ctx.fillText(`${task.model} · ${fmt_tok(total)} tokens`,
                 L.margin + L.panel_pad_x + 4, ty + 46);

    // Mini bar
    drawBar(ctx, L.margin + L.panel_pad_x + 4, ty + 56,
            L.content_w - L.panel_pad_x*2 - 4, pct);

    // Pct (small, right)
    ctx.fillStyle = T.dim;
    ctx.font = '500 13px "JetBrains Mono", monospace';
    ctx.textAlign = 'right';
    ctx.fillText(pct + '%', W - L.margin - L.panel_pad_x, ty + 46);
  });

  drawSpinnerLine(ctx, H - 30);
}

// ── Bluetooth screen ──────────────────────────────────────────────────
function renderBluetooth(ctx) {
  ctx.fillStyle = T.bg;
  ctx.fillRect(0, 0, W, H);
  drawHeader(ctx, 'Bluetooth', 0);

  // Status panel
  const p1y = L.panel_y;
  drawPanel(ctx, L.margin, p1y, L.content_w, 110);
  // BLE icon
  ctx.fillStyle = T.text;
  ctx.font = '600 28px "Inter", sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('⎈', L.margin + 18, p1y + 38);
  // Status
  ctx.fillStyle = bleConnected ? T.green : T.red;
  ctx.font = '600 32px "Inter", sans-serif';
  ctx.fillText(bleConnected ? 'Connected' : 'Disconnected', L.margin + 56, p1y + 40);
  // Device info
  ctx.fillStyle = T.dim;
  ctx.font = '500 17px "Inter", sans-serif';
  ctx.fillText('Device: Claude Controller', L.margin + 18, p1y + 70);
  ctx.fillText('Address: 1C:DB:D4:48:EA:09', L.margin + 18, p1y + 92);

  // Reset panel
  const p2y = p1y + 110 + L.panel_gap;
  drawPanel(ctx, L.margin, p2y, L.content_w, 76);
  ctx.fillStyle = T.text;
  ctx.font = '500 22px "Inter", sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('🗑  Reset Bluetooth', L.margin + 18, p2y + 46);

  // Credits
  ctx.fillStyle = T.dim;
  ctx.font = '500 16px "Inter", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Built by @hermannbjorgvin', W/2, H - 60);
  ctx.font = '500 13px "Inter", sans-serif';
  ctx.fillText('Clawd animations by @amaanbuilds', W/2, H - 36);
}

// ── Main render dispatch ────────────────────────────────────────────────
function renderScreen(ctx, idx) {
  if (idx === 0) renderSplash(ctx);
  else if (idx >= 1 && idx <= 5) renderProviderUsage(ctx, idx - 1);
  else if (idx === 6) renderTasks(ctx);
  else if (idx === 7) renderBluetooth(ctx);
}

// ── Animation loop ──────────────────────────────────────────────────────
let lastT = 0;
function tick(t) {
  const dt = Math.min(t - lastT, 100);
  lastT = t;

  // Rotate message every 4s
  messageElapsed += dt;
  if (messageElapsed >= 4000) {
    messageElapsed = 0;
    messageIdx = (messageIdx + 1) % ANIM_MESSAGES.length;
  }

  // Live state mutation — shifts which provider is most active every ~7s
  mutateElapsed += dt;
  if (mutateElapsed >= 7000) {
    mutateElapsed = 0;
    cycleActiveProvider();
  }

  // Auto-advance screens
  if (autoAdvance) {
    autoTimer += dt;
    if (autoTimer >= AUTO_MS) { autoTimer = 0; startTrans((curScreen+1)%NSCREENS); }
  }

  // Advance mascot frames
  PROVIDERS.forEach(p => {
    const mSt = getMascotState(p.id);
    const a = MANIM[p.mascot];
    a.elapsed += dt;
    const hold = getHold(p.mascot, mSt, a.frame);
    if (a.elapsed >= hold) {
      a.elapsed -= hold;
      const data = getFrameData(p.mascot, mSt, a.frame);
      const fc = data ? data.frames.length : 4;
      a.frame = (a.frame + 1) % fc;
    }
  });
  // Splash mascot — uses the currently active provider's mascot
  const splashIdx = getActiveProvider();
  const splashP = PROVIDERS[splashIdx];
  const splashSt = (getMascotState(splashP.id) === 'offline') ? 'idle' : getMascotState(splashP.id);
  SPLASH_ANIM.elapsed += dt;
  const sH = getHold(splashP.mascot, splashSt, SPLASH_ANIM.frame);
  if (SPLASH_ANIM.elapsed >= sH) {
    SPLASH_ANIM.elapsed -= sH;
    const sd = getFrameData(splashP.mascot, splashSt, SPLASH_ANIM.frame);
    const fc = sd ? sd.frames.length : 4;
    SPLASH_ANIM.frame = (SPLASH_ANIM.frame + 1) % fc;
  }

  // Follow-active-model: switch screen if active provider changed
  if (followActive) {
    const a = getActiveProvider();
    if (a !== lastActiveIdx) {
      lastActiveIdx = a;
      // Only jump if we're already on a provider screen (1-5) so user
      // can stay on Splash / Tasks / Bluetooth if they navigated there manually.
      if (curScreen >= 1 && curScreen <= 5 && !transition.active) {
        startTrans(a + 1);
      }
    }
  }

  // Transition or direct draw
  if (transition.active) {
    transition.t += dt;
    const p = Math.min(1, transition.t / transition.dur);
    const e = 1 - Math.pow(1-p, 3);
    renderScreen(off1.getContext('2d'), transition.from);
    renderScreen(off2.getContext('2d'), transition.to);
    CTX.clearRect(0,0,W,H);
    CTX.drawImage(off1, -e*W, 0);
    CTX.drawImage(off2, (1-e)*W, 0);
    if (p >= 1) {
      transition.active = false;
      curScreen = transition.to;
      updateTabs();
    }
  } else {
    renderScreen(CTX, curScreen);
  }

  requestAnimationFrame(tick);
}

function startTrans(to) {
  if (transition.active) { curScreen = transition.to; transition.active = false; }
  transition = { active: true, from: curScreen, to, t: 0, dur: 320 };
  autoTimer = 0; updateTabs();
}
function goScreen(n) { startTrans(n); }
function cycleNext() { startTrans((curScreen+1)%NSCREENS); }
function toggleAuto() {
  autoAdvance = !autoAdvance; autoTimer = 0;
  document.getElementById('auto-btn').textContent = autoAdvance ? '⏸ Pause' : '▶ Play';
}
function toggleFollow() {
  followActive = !followActive;
  const b = document.getElementById('follow-btn');
  b.classList.toggle('on', followActive);
  b.textContent = followActive ? '⤳ Follow active' : '⤳ Manual';
}
function toggleBLE() {
  bleConnected = !bleConnected;
  const b = document.getElementById('ble-btn');
  b.textContent = bleConnected ? 'BLE: On' : 'BLE: Off';
  b.classList.toggle('on', !bleConnected);
}
function updateTabs() {
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('on', i===curScreen));
}
document.getElementById('screen-frame').addEventListener('click', () => startTrans((curScreen+1)%NSCREENS));

requestAnimationFrame(tick);
</script>
