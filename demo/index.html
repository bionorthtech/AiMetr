  if (s.pct >= 10) return 'thinking';

  if (mascotId === 'clawd' && typeof CLAWD_SPRITES !== 'undefined') {

  return 4; // procedural: 4 frames

    const v = flatGrid[i];

    ctx.fillStyle = col;
    ctx.fillRect(x + px*scale, y + py*scale, scale, scale);
  }
  ctx.restore();
}

  const mSt = getMascotState(provId);
  const st  = (mSt === 'offline') ? 'idle' : mSt;
  const alpha = (mSt === 'offline') ? 0.25 : 1.0;
  const anim = MANIM[mascotId];

  if (mascotId === 'clawd' && typeof CLAWD_SPRITES !== 'undefined') {
    const a = CLAWD_SPRITES[st] || CLAWD_SPRITES.idle;
    const frame = a.frames[anim.frame % a.frames.length];
    drawSprite(ctx, ox, oy, frame, a.palette, scale, alpha);
    return;
  }
  if (mascotId === 'seeker' && typeof SEEKER_SPRITE !== 'undefined') {
    const frames = SEEKER_SPRITE.frames[st] || SEEKER_SPRITE.frames.idle;
    const frame = frames[anim.frame % frames.length];
    drawSprite(ctx, ox, oy, frame, SEEKER_SPRITE.palette, scale, alpha);
    return;
  }
  if (mascotId === 'codex' && typeof CODEX_SPRITE !== 'undefined') {
    const frames = CODEX_SPRITE.frames[st] || CODEX_SPRITE.frames.idle;
    const frame = frames[anim.frame % frames.length];
    drawSprite(ctx, ox, oy, frame, CODEX_SPRITE.palette, scale, alpha);
    return;
  }
  // Procedural fallback for llami + studio
  if (mascotId === 'llami') drawLlamiProc(ctx, cx, cy, size, mSt, anim.frame);
  else if (mascotId === 'studio') drawStudioProc(ctx, cx, cy, size, mSt, anim.frame);
}

// ── Procedural: Ollama llama ─────────────────────────────────────────────────
function drawLlamiProc(ctx, cx, cy, size, state, frame) {
  const s  = size / 120;
  const b  = (state==='excited') ? (frame%2?-3:3)*s : (state==='idle') ? (frame%2?0:2)*s : 0;
  ctx.save();
  ctx.translate(cx, cy + b);
  const gold='#F9A825', cream='#FFE6B4', brn='#784A14';
  // Neck
  fillR(ctx,-14*s,8*s,28*s,28*s,4*s,gold);
  // Head
  fillR(ctx,-30*s,-30*s,60*s,52*s,16*s,gold);
  // Snout
  fillR(ctx,-18*s,4*s,36*s,20*s,8*s,cream);
  // Ears
  fillR(ctx,-30*s,-44*s,14*s,22*s,4*s,gold);
  fillR(ctx,16*s,-44*s,14*s,22*s,4*s,gold);
  fillR(ctx,-27*s,-41*s,8*s,14*s,2*s,cream);
  fillR(ctx,19*s,-41*s,8*s,14*s,2*s,cream);
  // Tuft
  fillCirc(ctx,-8*s,-28*s,8*s,cream);
  fillCirc(ctx,0,-32*s,9*s,cream);
  fillCirc(ctx,8*s,-28*s,8*s,cream);
  // Eyes
  if(state==='sleeping'){
    ctx.strokeStyle=brn; ctx.lineWidth=3*s;
    ctx.beginPath(); ctx.moveTo(-18*s,-10*s); ctx.lineTo(-8*s,-10*s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(8*s,-10*s);   ctx.lineTo(18*s,-10*s); ctx.stroke();
  } else {
    fillCirc(ctx,-14*s,-10*s,7*s,brn);
    fillCirc(ctx,14*s,-10*s,7*s,brn);
    fillCirc(ctx,-12*s,-12*s,2.5*s,'#fff');
    fillCirc(ctx,16*s,-12*s,2.5*s,'#fff');
  }
  // Nostrils
  fillCirc(ctx,-6*s,14*s,3*s,brn);
  fillCirc(ctx,6*s,14*s,3*s,brn);
  // Thinking dots
  if(state==='thinking') {
    for(let i=0;i<3;i++){
      const a=(frame*90+i*120)*Math.PI/180;
      fillCirc(ctx,Math.cos(a)*22*s,-42*s+Math.sin(a)*8*s,4*s,gold);
    }
  }
  ctx.restore();
}

// ── Procedural: LM Studio robot ──────────────────────────────────────────────
function drawStudioProc(ctx, cx, cy, size, state, frame) {
  const s=size/120;
  const b=(state==='excited')?(frame%2?-3:3)*s:(state==='idle')?(frame%2?0:2)*s:0;
  const led=(state==='excited')?'#FF50FF':'#C864FF';
  ctx.save();
  ctx.translate(cx, cy + b);
  // Antenna
  fillR(ctx,-2*s,-56*s,4*s,20*s,2*s,'#C88ADC');
  fillCirc(ctx,0,-58*s,6*s,frame%2===0?led:'#7c3aed');
  // Head
  fillR(ctx,-34*s,-36*s,68*s,62*s,10*s,'#9C27B0');
  // Visor
  fillR(ctx,-28*s,-28*s,56*s,38*s,6*s,'#3C0A50');
  // LED eyes
  const er=(state==='thinking')?6+frame%3:8;
  fillR(ctx,-22*s,-16*s,er*2*s,er*2*s,3*s,led);
  fillR(ctx,6*s,-16*s,er*2*s,er*2*s,3*s,led);
  fillCirc(ctx,-18*s,-12*s,2*s,'#fff');
  fillCirc(ctx,10*s,-12*s,2*s,'#fff');
  // Mouth segments
  const segs=(state==='excited')?6:4;
  for(let i=0;i<segs;i++) {
    fillR(ctx,(-22+i*9)*s,8*s,6*s,4*s,1,i%2===frame%2?led:'#3C0A50');
  }
  // Bolts
  [[-34,-10],[-34,10],[34,-10],[34,10]].forEach(([bx,by])=>fillCirc(ctx,bx*s,by*s,4*s,'#C88ADC'));
  // Neck + shoulders
  fillR(ctx,-14*s,26*s,28*s,12*s,4*s,'#9C27B0');
  fillR(ctx,-42*s,32*s,84*s,12*s,6*s,'#C88ADC');
  ctx.restore();
}

// ── Canvas helpers ────────────────────────────────────────────────────────────
function fillR(ctx,x,y,w,h,r,col){
  ctx.fillStyle=col; ctx.beginPath();
  ctx.roundRect(x,y,w,h,r); ctx.fill();
}
function fillCirc(ctx,x,y,r,col){
  ctx.fillStyle=col; ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
}
function barColor(pct){
  if(pct>=80) return C.red;
  if(pct>=60) return C.orange;
  if(pct>=40) return C.yellow;
  return C.green2;
}
function fmtCost(v){ return v<0.01?'$0.00':'$'+v.toFixed(2); }
function fmtReset(m){ if(m<=0) return '—'; if(m>=60) return Math.floor(m/60)+'h '+m%60+'m'; return m+'m'; }
function fmtTok(n){ if(n>=1e6) return (n/1e6).toFixed(1)+'M'; if(n>=1000) return (n/1000).toFixed(1)+'k'; return String(n); }

// ── Drawing primitives ────────────────────────────────────────────────────────
function drawBar(ctx, x, y, w, h, pct, radius=4) {
  // Track
  ctx.fillStyle = C.border;
  ctx.beginPath(); ctx.roundRect(x,y,w,h,radius); ctx.fill();
  // Fill
  const fw = Math.max(0, Math.min(w, (w*pct)/100));
  if(fw > 0) {
    ctx.fillStyle = barColor(pct);
    ctx.beginPath(); ctx.roundRect(x,y,fw,h,radius); ctx.fill();
  }
}

function drawStatBox(ctx, x, y, w, h, label, value) {
  ctx.fillStyle = C.surface2;
  ctx.beginPath(); ctx.roundRect(x,y,w,h,8); ctx.fill();
  ctx.fillStyle = C.dim;
  ctx.font = '10px -apple-system,sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(label, x+8, y+18);
  ctx.fillStyle = C.text;
  ctx.font = 'bold 13px -apple-system,sans-serif';
  const val = String(value).length > 14 ? String(value).slice(0,13)+'…' : String(value);
  ctx.fillText(val, x+8, y+h-10);
}

function drawBadge(ctx, x, y, text, ok) {
  const pad = 8, h = 20;
  ctx.font = '10px -apple-system,sans-serif';
  const tw = ctx.measureText(text).width;
  const bw = tw + pad*2;
  ctx.fillStyle = ok ? '#14532d' : '#450a0a';
  ctx.beginPath(); ctx.roundRect(x,y,bw,h,10); ctx.fill();
  ctx.fillStyle = ok ? C.green : C.red;
  ctx.textAlign = 'left';
  ctx.fillText(text, x+pad, y+13);
  return bw;
}

function drawNavDots(ctx, current) {
  const n=NSCREENS, r=4, gap=12;
  const total = n*(r*2)+(n-1)*gap;
  let x = (W-total)/2;
  for(let i=0;i<n;i++) {
    ctx.beginPath();
    ctx.arc(x+r, H-14, r, 0, Math.PI*2);
    ctx.fillStyle = i===current ? C.accent : C.border;
    ctx.fill();
    x += r*2+gap;
  }
}

function drawStatusBar(ctx) {
  ctx.fillStyle = C.surface;
  ctx.fillRect(0,0,W,36);
  ctx.fillStyle = C.border;
  ctx.fillRect(0,35,W,1);
  // Title
  ctx.fillStyle = C.text;
  ctx.font = 'bold 15px -apple-system,sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('CLAWDMETER', 14, 23);
  // BLE dot
  ctx.beginPath(); ctx.arc(W-14,18,5,0,Math.PI*2);
  ctx.fillStyle = bleConnected ? C.green : C.red;
  ctx.fill();
  // Time mock
  ctx.fillStyle = C.dim;
  ctx.font = '11px -apple-system,sans-serif';
  ctx.textAlign = 'right';
  const now = new Date();
  ctx.fillText(now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0'), W-30,23);
}

// ── Screen 0: Overview ────────────────────────────────────────────────────────
function renderOverview(ctx) {
  ctx.fillStyle = C.bg; ctx.fillRect(0,0,W,H);
  drawStatusBar(ctx);

  const TW=144, TH=158, GAP=8;
  // Row 1: 3 tiles
  const row1y = 46, row1xs = [8, 8+TW+GAP, 8+2*(TW+GAP)];
  // Row 2: 2 tiles centred
  const row2y = row1y+TH+GAP;
  const row2x0 = Math.round((W - 2*TW - GAP)/2);
  const row2xs  = [row2x0, row2x0+TW+GAP];
  const coords = [...row1xs.map(x=>[x,row1y]), ...row2xs.map(x=>[x,row2y])];

  coords.forEach(([tx,ty],i) => {
    const p   = PROVIDERS[i];
    const st  = STATE[p.id];
    const pct = st.pct || 0;
    const ok  = st.connected;

    // Card bg
    ctx.fillStyle = C.surface;
    ctx.beginPath(); ctx.roundRect(tx,ty,TW,TH,10); ctx.fill();
    // Left accent bar
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.roundRect(tx,ty,3,TH,3); ctx.fill();

    // Provider short name
    ctx.fillStyle = p.color;
    ctx.font = 'bold 10px -apple-system,sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(p.short, tx+8, ty+15);

    // Connection dot
    ctx.beginPath(); ctx.arc(tx+TW-10, ty+10, 5, 0, Math.PI*2);
    ctx.fillStyle = ok ? C.green : C.red;
    ctx.fill();

    // Mascot (60×60 at scale 3)
    const mcx = tx + TW/2, mcy = ty+20+30; // center of mascot
    drawMascot(ctx, p.mascot, p.id, mcx, mcy, 60);

    // Glow under mascot when active
    if(ok && pct > 0) {
      const grd = ctx.createRadialGradient(mcx,mcy,5,mcx,mcy,36);
      grd.addColorStop(0, p.color+'40'); grd.addColorStop(1,'transparent');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.ellipse(mcx,mcy+28,28,8,0,0,Math.PI*2); ctx.fill();
    }

    // Pct label
    ctx.textAlign = 'center';
    ctx.fillStyle = ok ? C.text : C.dim;
    ctx.font = 'bold 16px -apple-system,sans-serif';
    ctx.fillText(ok ? pct+'%' : '—', tx+TW/2, ty+TH-32);

    // Bar
    drawBar(ctx, tx+8, ty+TH-18, TW-16, 7, pct, 3);
  });

  drawNavDots(ctx, 0);
}

// ── Screen 1–5: Per-provider ──────────────────────────────────────────────────
function renderProvider(ctx, provIdx) {
  const p   = PROVIDERS[provIdx];
  const st  = STATE[p.id];
  const ok  = st.connected;

  ctx.fillStyle = C.bg; ctx.fillRect(0,0,W,H);
  drawStatusBar(ctx);

  // Provider header bar
  ctx.fillStyle = C.surface;
  ctx.fillRect(0,36,W,44);
  // Left accent
  ctx.fillStyle = p.color;
  ctx.fillRect(0,36,3,44);
  // Name
  ctx.fillStyle = C.text;
  ctx.font = 'bold 18px -apple-system,sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(p.name, 14, 64);
  // Badge
  const badgeW = drawBadge(ctx, W-14-(ok?100:80), 47, ok?'CONNECTED':'OFFLINE', ok);
  // Separator
  ctx.fillStyle = C.border;
  ctx.fillRect(0,79,W,1);

  // ── Mascot area ──────────────────────────────────────────────────────────
  const mcx = W/2, mcy = 175;
  const mascotSize = 120;

  // Glow ring
  if(ok) {
    const glowR = mascotSize/2 + 20;
    const grd = ctx.createRadialGradient(mcx,mcy,mascotSize/2-10,mcx,mcy,glowR+12);
    grd.addColorStop(0, p.color+'35');
    grd.addColorStop(0.6, p.color+'15');
    grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd;
    ctx.beginPath(); ctx.arc(mcx,mcy,glowR+12,0,Math.PI*2); ctx.fill();
  }

  // Mascot bg circle
  ctx.fillStyle = C.surface;
  ctx.beginPath(); ctx.arc(mcx,mcy,mascotSize/2+12,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = ok ? p.color : C.border;
  ctx.lineWidth = ok ? 2 : 1;
  ctx.beginPath(); ctx.arc(mcx,mcy,mascotSize/2+12,0,Math.PI*2); ctx.stroke();

  drawMascot(ctx, p.mascot, p.id, mcx, mcy, mascotSize);

  // Activity arc (pct as arc around mascot)
  if(ok && st.pct > 0) {
    ctx.strokeStyle = p.color;
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.arc(mcx,mcy, mascotSize/2+12, -Math.PI/2, -Math.PI/2 + (st.pct/100)*Math.PI*2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // State label under mascot
  const mStKey = getMascotState(p.id);
  const stateLabels = {idle:'Idle',thinking:'Thinking…',excited:'Busy!',sleeping:'Sleeping',offline:'Offline'};
  ctx.fillStyle = ok ? p.color : C.dim;
  ctx.font = '11px -apple-system,sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(stateLabels[mStKey]||'', mcx, 250);

  // ── Usage bars ────────────────────────────────────────────────────────────
  if(ok) {
    // Session
    ctx.fillStyle = C.dim; ctx.font='11px -apple-system,sans-serif';
    ctx.textAlign='left';
    ctx.fillText('Session', 16, 274);
    ctx.fillStyle=C.text; ctx.font='bold 11px -apple-system,sans-serif';
    ctx.textAlign='right';
    ctx.fillText(st.pct+'%  '+fmtTok(st.tokens||0)+' / '+fmtTok(st.limit||0), W-16, 274);
    drawBar(ctx, 16, 278, W-32, 12, st.pct, 5);

    // Period
    ctx.fillStyle=C.dim; ctx.font='11px -apple-system,sans-serif';
    ctx.textAlign='left';
    ctx.fillText('Period', 16, 306);
    ctx.fillStyle=C.text; ctx.font='bold 11px -apple-system,sans-serif';
    ctx.textAlign='right';
    ctx.fillText(st.pct2+'%', W-16, 306);
    drawBar(ctx, 16, 310, W-32, 12, st.pct2, 5);

    // Stats row
    const sw=(W-40)/3, sy=332;
    drawStatBox(ctx, 16,            sy, sw, 66, 'Cost (session)', fmtCost(st.cost||0));
    drawStatBox(ctx, 16+sw+8,       sy, sw, 66, 'Rate limit reset', fmtReset(st.reset||0));
    drawStatBox(ctx, 16+2*(sw+8),   sy, sw, 66, 'Active model', st.model||'—');

    // Token velocity mini-chart (mock)
    drawMiniVelocity(ctx, 16, 408, W-32, 36, p.color);
  } else {
    ctx.fillStyle = C.dim;
    ctx.font = '14px -apple-system,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(st.error||'Not configured', W/2, 295);
    // Configure hint
    ctx.fillStyle = C.surface2;
    ctx.beginPath(); ctx.roundRect(W/2-80,310,160,32,8); ctx.fill();
    ctx.fillStyle = C.dim;
    ctx.font = '12px -apple-system,sans-serif';
    ctx.fillText('⚙  Configure in Settings', W/2, 331);
  }

  drawNavDots(ctx, provIdx+1);
}

// ── Mini velocity sparkline (mock) ─────────────────────────────────────────
function drawMiniVelocity(ctx, x, y, w, h, color) {
  ctx.fillStyle = C.surface;
  ctx.beginPath(); ctx.roundRect(x,y,w,h,6); ctx.fill();
  ctx.fillStyle = C.dim; ctx.font='9px -apple-system,sans-serif'; ctx.textAlign='left';
  ctx.fillText('Token velocity (mock)', x+8, y+12);
  // Fake sparkline
  const pts=20; const t=Date.now()/800;
  ctx.strokeStyle = color+'cc'; ctx.lineWidth=1.5; ctx.lineJoin='round';
  ctx.beginPath();
  for(let i=0;i<pts;i++){
    const xi=x+8+(w-16)*i/(pts-1);
    const yi=y+h-6 - (Math.sin(t+i*0.7)+1)*((h-22)/2);
    i===0?ctx.moveTo(xi,yi):ctx.lineTo(xi,yi);
  }
  ctx.stroke();
}

// ── Screen 6: Tasks ───────────────────────────────────────────────────────────
function renderTasks(ctx) {
  ctx.fillStyle = C.bg; ctx.fillRect(0,0,W,H);
  drawStatusBar(ctx);

  ctx.fillStyle = C.dim;
  ctx.font = 'bold 11px -apple-system,sans-serif';
  ctx.textAlign = 'left';
  ctx.letterSpacing = '0.08em';
  ctx.fillText('ACTIVE TASKS', 16, 55);
  ctx.letterSpacing = '0';

  ctx.fillStyle = C.border; ctx.fillRect(0,60,W,1);

  const cardH=70, gap=6;
  TASKS.forEach((task,i)=>{
    const ty=66+i*(cardH+gap);
    const p=PROVIDERS[task.prov];
    const total=task.ti+task.to;
    const pct=Math.min(100,Math.round(total*100/task.limit));

    ctx.fillStyle=C.surface;
    ctx.beginPath(); ctx.roundRect(12,ty,W-24,cardH,8); ctx.fill();
    // Provider accent
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.roundRect(12,ty,3,cardH,3); ctx.fill();

    // Status dot
    ctx.fillStyle=C.green;
    ctx.beginPath(); ctx.arc(26,ty+18,4,0,Math.PI*2); ctx.fill();
    // Pulse ring
    ctx.strokeStyle=C.green+'44'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(26,ty+18,7+Math.sin(Date.now()/300)*2,0,Math.PI*2); ctx.stroke();

    // Label
    ctx.fillStyle=C.text; ctx.font='bold 12px -apple-system,sans-serif'; ctx.textAlign='left';
    const lbl=task.label.length>40?task.label.slice(0,38)+'…':task.label;
    ctx.fillText(lbl, 36, ty+20);

    // Model tag
    ctx.fillStyle=C.border;
    const tagW=ctx.measureText(task.model).width+14;
    ctx.beginPath(); ctx.roundRect(W-14-tagW,ty+8,tagW,18,4); ctx.fill();
    ctx.fillStyle=C.dim; ctx.font='10px -apple-system,sans-serif'; ctx.textAlign='left';
    ctx.fillText(task.model, W-14-tagW+7, ty+20);

    // Meta
    ctx.fillStyle=C.dim; ctx.font='10px -apple-system,sans-serif';
    ctx.fillText(fmtTok(total)+' tokens · '+pct+'%', 36, ty+36);

    // Progress bar
    drawBar(ctx, 36, ty+44, W-52, 8, pct, 4);
  });

  drawNavDots(ctx, 6);
}

// ── Main render dispatch ─────────────────────────────────────────────────────
function renderScreen(ctx2, screenIdx) {
  if(screenIdx===0) renderOverview(ctx2);
  else if(screenIdx>=1&&screenIdx<=5) renderProvider(ctx2, screenIdx-1);
  else renderTasks(ctx2);
}

// ── Animation loop ────────────────────────────────────────────────────────────
let lastTime = 0;

function advance(timestamp) {
  const dt = Math.min(timestamp - lastTime, 100);
  lastTime = timestamp;

  // Auto-advance
  if(autoAdvance) {
    autoTimer += dt;
    if(autoTimer >= AUTO_MS) {
      autoTimer = 0;
      startTransition((curScreen+1)%NSCREENS);
    }
  }

  // Advance mascot frames
  PROVIDERS.forEach(p=>{
    const mSt = getMascotState(p.id);
    const anim = MANIM[p.mascot];
    anim.elapsed += dt;
    const hold = getMascotHold(p.mascot, mSt, anim.frame);
    if(anim.elapsed >= hold) {
      anim.elapsed -= hold;
      anim.frame = (anim.frame+1) % getMascotFrameCount(p.mascot, mSt);
    }
  });

  // Handle transition
  if(transition.active) {
    transition.t += dt;
    const progress = Math.min(1, transition.t / transition.dur);
    const ease = 1 - Math.pow(1-progress,3); // ease-out cubic

    // Render from screen into offscreen1, to screen into offscreen2
    renderScreen(offscreen1.getContext('2d'), transition.from);
    renderScreen(offscreen2.getContext('2d'), transition.to);

    CTX.clearRect(0,0,W,H);
    // From screen slides left
    CTX.drawImage(offscreen1, -ease*W, 0);
    // To screen comes in from right
    CTX.drawImage(offscreen2, (1-ease)*W, 0);

    if(progress >= 1) {
      transition.active = false;
      curScreen = transition.to;
      updateTabHighlight();
    }
  } else {
    renderScreen(CTX, curScreen);
  }

  requestAnimationFrame(advance);
}

function startTransition(to) {
  if(transition.active) {
    curScreen = transition.to;
    transition.active = false;
  }
  transition = { active:true, from:curScreen, to, t:0, dur:280 };
  autoTimer = 0;
  updateTabHighlight();
}

// ── Controls ──────────────────────────────────────────────────────────────────
function goScreen(n) { startTransition(n); }
function cycleNext() { startTransition((curScreen+1)%NSCREENS); }

function toggleAuto() {
  autoAdvance = !autoAdvance;
  autoTimer   = 0;
  document.getElementById('auto-btn').textContent =
    autoAdvance ? '⏸ Pause Auto' : '▶ Resume Auto';
}

function toggleBLE() {
  bleConnected = !bleConnected;
  document.getElementById('ble-btn').textContent =
    bleConnected ? 'BLE: Connected' : 'BLE: Offline';
  document.getElementById('ble-btn').classList.toggle('active', !bleConnected);
}

function updateTabHighlight() {
  const tabs = document.getElementById('screen-tabs').children;
  for(let i=0;i<tabs.length;i++)
    tabs[i].classList.toggle('on', i===curScreen);
}

document.getElementById('screen-frame').addEventListener('click', ()=>{
  startTransition((curScreen+1)%NSCREENS);
});

// Kick off
requestAnimationFrame(advance);
</script>
